<form>
  <input
    type="file"
    accept="image/*"
    (change)="setFile($event.target)"
    name="file"
  >

  <img
    *ngIf="filePreviewSource"
    [src]="filePreviewSource"
    alt="Image preview"
  />

  <button type="submit">Upload</button>
  <button
    type="submit"
    (click)="classify()"
  >
    Upload
  </button>
</form>
